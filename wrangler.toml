#:schema node_modules/wrangler/config-schema.json
name = "mmlogin"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages：`nuxt build`（cloudflare-pages preset）会输出到 dist/
pages_build_output_dir = "dist"

# ── D1：强一致 KV 存储（用户 / 会话 / 认证任务 / 资料）──────────────────────────
# 创建：wrangler d1 create mmlogin-db  然后把 database_id 填进来
[[d1_databases]]
binding = "DB"
database_name = "mmlogin-db"
database_id = "febb6439-5e1a-44ef-956a-c9f2c2a0813f"
# 表 mm_store(k,v,exp) 会在首次请求时自动创建（CREATE TABLE IF NOT EXISTS）

# ── 环境变量 / 密钥 ────────────────────────────────────────────────────────────
# 在 Cloudflare Pages 项目设置里配置以下变量（本地默认值见 nuxt.config.ts）：
#   NUXT_FUNNYBOT_URL     funnybot 公网地址，默认 http://funnybot.h3cof6.com
#   NUXT_MM_TOKEN         与 funnybot routers/mm.py 里 MM_AUTH_TOKEN 一致
#   NUXT_PUBLIC_SITE_URL  站点公网地址（可留空，自动用请求 origin）
